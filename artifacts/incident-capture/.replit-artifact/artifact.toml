kind = "web"
previewPath = "/"
title = "SimonsVoss Incident Capture"
version = "1.0.0"
id = "artifacts/incident-capture"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22138

[services.development]
run = "pnpm --filter @workspace/incident-capture run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/incident-capture", "run", "build" ]
publicDir = "artifacts/incident-capture/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22138"
BASE_PATH = "/"
